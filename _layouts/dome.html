<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: "Geodesic Dome Builder" }} - {{ site.title }}</title>
    
    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Custom styles -->
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f1f5f9;
            --primary-color: #38bdf8;
            --accent-color: #fb7185;
            --header-height: 60px;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        header {
            height: var(--header-height);
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
            border-bottom: 1px solid #334155;
            z-index: 100;
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 1.25rem;
            cursor: pointer;
            padding: 10px;
            border-radius: 12px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--primary-color);
        }

        main {
            height: calc(100vh - var(--header-height));
            display: grid;
            grid-template-columns: 1fr 340px;
            overflow: hidden;
        }

        @media (max-width: 1024px) {
            main {
                grid-template-columns: 1fr 300px;
            }
        }
        
        @media (max-width: 768px) {
            main {
                display: flex;
                flex-direction: column;
            }
            .visual-area {
                height: 50vh;
            }
            .side-panel {
                height: 50vh;
                border-left: none;
                border-top: 1px solid #334155;
            }
        }

        .visual-area {
            padding: 20px;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            position: relative;
        }

        .dome-container {
            width: 100%;
            height: 100%;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid #334155;
            touch-action: none;
        }

        .side-panel {
            background: #1e293b;
            border-left: 1px solid #334155;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-content {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
        }

        .section-title {
            font-size: 0.75rem;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .data-card {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .data-card:hover {
            border-color: var(--primary-color);
            background: rgba(56, 189, 248, 0.05);
        }

        .data-card.active {
            border-color: var(--primary-color);
            background: rgba(56, 189, 248, 0.1);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.1);
        }

        .param-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 24px;
        }

        .param-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .param-label {
            font-size: 0.85rem;
            color: #94a3b8;
        }

        .param-value {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--primary-color);
            font-family: 'JetBrains Mono', monospace;
        }

        .slider {
            width: 100%;
            accent-color: var(--primary-color);
            margin-top: 4px;
        }

        .tab-btn {
            flex: 1;
            padding: 1rem 0.5rem;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #94a3b8;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        .tab-btn:hover {
            color: var(--text-color);
            background: rgba(255, 255, 255, 0.02);
        }

        .tab-btn.active {
            color: var(--primary-color);
            border-bottom-color: var(--primary-color);
            background: rgba(56, 189, 248, 0.05);
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

        .step-view {
            cursor: move;
            border-radius: 8px;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <header>
        <div class="flex items-center">
            <a href="/apps/" class="icon-btn" title="Back to Apps">
                <i class="bi bi-arrow-left"></i>
            </a>
            <h1 id="app-title" class="text-lg font-bold ml-2">7m Geodesic Dome Builder</h1>
        </div>
        <div class="flex items-center gap-2">
            <button class="icon-btn" title="Save Design" id="save-design-btn"><i class="bi bi-bookmark"></i></button>
            <button class="icon-btn" title="Explode Joints (Detached)" id="explode-joints-toggle"><i class="bi bi-arrows-expand"></i></button>
            <button class="icon-btn" title="Toggle View Mode" id="view-mode-cycle"><i class="bi bi-eye"></i></button>
            <button class="icon-btn" title="Reset View" id="reset-view"><i class="bi bi-camera-repath"></i></button>
        </div>
    </header>

    {{ content }}
    
    <!-- Dome Simulator JavaScript -->
    <script src="{{ '/js/profile.js' | relative_url }}"></script>
    <script src="{{ '/js/inventory-filter.js' | relative_url }}"></script>
    <script src="{{ '/js/dome-simulator.js' | relative_url }}"></script>
</body>
</html>
